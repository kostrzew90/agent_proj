<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoring Dashboard — kontekst.ai</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.02em;
    }

    #last-updated {
      font-size: 12px;
      color: #8b949e;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto auto;
      gap: 16px;
      padding: 20px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #21262d;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    /* Health */
    .badge-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 14px;
      flex: 1;
      min-width: 100px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #7ee787; box-shadow: 0 0 6px #7ee78770; }
    .dot-red   { background: #f85149; box-shadow: 0 0 6px #f8514970; }
    .dot-yellow { background: #d29922; box-shadow: 0 0 6px #d2992270; }
    .dot-grey  { background: #484f58; }

    .badge-label {
      font-size: 13px;
      font-weight: 500;
      color: #c9d1d9;
    }

    .badge-status {
      font-size: 11px;
      margin-left: auto;
    }

    .text-green  { color: #7ee787; }
    .text-red    { color: #f85149; }
    .text-yellow { color: #d29922; }
    .text-blue   { color: #58a6ff; }
    .text-muted  { color: #8b949e; }

    /* Stats */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .stat-item {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 10px 12px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #58a6ff;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 11px;
      color: #8b949e;
      margin-top: 3px;
    }

    /* Retrieval / LLM */
    .metric-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: #0d1117;
      border-radius: 5px;
      border: 1px solid #21262d;
    }

    .metric-key {
      color: #8b949e;
      font-size: 12px;
    }

    .metric-val {
      font-size: 13px;
      font-weight: 500;
      color: #c9d1d9;
    }

    .provider-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
      font-size: 12px;
    }

    .provider-table th {
      text-align: left;
      color: #8b949e;
      font-weight: 500;
      padding: 5px 8px;
      border-bottom: 1px solid #21262d;
    }

    .provider-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #21262d;
      color: #c9d1d9;
    }

    .provider-table tr:last-child td { border-bottom: none; }
    .provider-table tbody tr:hover { background: #1c2128; }

    /* Indexing */
    .indexing-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .status-completed { background: #1a3a20; color: #7ee787; border: 1px solid #2ea04330; }
    .status-running   { background: #1a2d3a; color: #58a6ff; border: 1px solid #388bfd30; }
    .status-failed    { background: #3a1a1a; color: #f85149; border: 1px solid #da363330; }
    .status-unknown   { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

    /* Errors */
    .error-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .error-table th {
      text-align: left;
      color: #8b949e;
      font-weight: 500;
      padding: 6px 8px;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }

    .error-table td {
      padding: 6px 8px;
      border-bottom: 1px solid #161b22;
      vertical-align: top;
      max-width: 0;
    }

    .error-table tbody tr:hover { background: #1c2128; }

    .error-table .col-time    { width: 80px; color: #8b949e; white-space: nowrap; }
    .error-table .col-service { width: 90px; color: #58a6ff; }
    .error-table .col-level   { width: 60px; }
    .error-table .col-msg     { color: #c9d1d9; word-break: break-word; white-space: normal; }
    .error-table .col-sig     { color: #8b949e; font-family: 'Courier New', monospace; word-break: break-all; }
    .error-table .col-count   { width: 50px; text-align: right; font-weight: 600; color: #f85149; }
    .error-table .col-seen    { width: 80px; color: #8b949e; white-space: nowrap; }

    .level-error { color: #f85149; }
    .level-warn  { color: #d29922; }
    .level-info  { color: #58a6ff; }

    .toggle-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 5px;
      color: #58a6ff;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .toggle-btn:hover { background: #2d333b; }

    .unavailable {
      color: #8b949e;
      font-style: italic;
      font-size: 13px;
      padding: 12px 0;
    }

    .dash { color: #484f58; }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .full-width { grid-column: 1; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Monitoring Dashboard — kontekst.ai</h1>
  <span id="last-updated">Last updated: —</span>
</header>

<div class="grid">
  <!-- Row 1 Left: Health -->
  <div class="card" id="card-health">
    <div class="card-title">System Health</div>
    <div class="unavailable">Loading...</div>
  </div>

  <!-- Row 1 Right: Stats -->
  <div class="card" id="card-stats">
    <div class="card-title">Index Stats</div>
    <div class="unavailable">Loading...</div>
  </div>

  <!-- Row 2 Left: Retrieval -->
  <div class="card" id="card-retrieval">
    <div class="card-title">Retrieval Performance</div>
    <div class="unavailable">Loading...</div>
  </div>

  <!-- Row 2 Right: LLM -->
  <div class="card" id="card-llm">
    <div class="card-title">LLM Usage</div>
    <div class="unavailable">Loading...</div>
  </div>

  <!-- Row 3 Left: Indexing -->
  <div class="card" id="card-indexing">
    <div class="card-title">Last Indexing Job</div>
    <div class="unavailable">Loading...</div>
  </div>

  <!-- Row 3 Right: Top Errors -->
  <div class="card" id="card-top-errors">
    <div class="card-title">Top Errors 24h</div>
    <div class="unavailable">Loading...</div>
  </div>

  <!-- Row 4: Recent Errors -->
  <div class="card full-width" id="card-recent-errors">
    <div class="card-title">Recent Errors</div>
    <div class="unavailable">Loading...</div>
  </div>
</div>

<script>
  // ─── Formatting helpers ───────────────────────────────────────────────────

  function fmtMs(val) {
    if (val === null || val === undefined) return '<span class="dash">—</span>';
    return (Number(val)).toFixed(1) + 'ms';
  }

  function fmtNum(val) {
    if (val === null || val === undefined) return '<span class="dash">—</span>';
    return Number(val).toLocaleString('en-US');
  }

  function fmtPct(numerator, denominator) {
    if (!denominator) return '<span class="dash">—</span>';
    return ((numerator / denominator) * 100).toFixed(1) + '%';
  }

  function fmtPctDirect(val) {
    if (val === null || val === undefined) return '<span class="dash">—</span>';
    return (Number(val) * 100).toFixed(1) + '%';
  }

  function fmtTime(isoStr) {
    if (!isoStr) return '<span class="dash">—</span>';
    try {
      const d = new Date(isoStr);
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return isoStr; }
  }

  function orDash(val) {
    if (val === null || val === undefined || val === '' || val === 0) return '<span class="dash">—</span>';
    return val;
  }

  function fmtDuration(ms) {
    if (!ms) return '<span class="dash">—</span>';
    if (ms < 1000) return ms + 'ms';
    if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
    return (ms / 60000).toFixed(1) + 'min';
  }

  // ─── Render functions ─────────────────────────────────────────────────────

  function renderHealth(health) {
    const card = document.getElementById('card-health');
    if (!health) {
      card.innerHTML = '<div class="card-title">System Health</div><div class="unavailable">API unavailable</div>';
      return;
    }

    const db     = health.db;
    const ollama = health.ollama;
    const embed  = health.ollama; // embed uses ollama

    function badge(label, ok) {
      const cls   = ok ? 'dot-green' : 'dot-red';
      const text  = ok ? 'OK'        : 'DOWN';
      const tcls  = ok ? 'text-green' : 'text-red';
      return `<div class="badge">
        <span class="dot ${cls}"></span>
        <span class="badge-label">${label}</span>
        <span class="badge-status ${tcls}">${text}</span>
      </div>`;
    }

    const overallOk = health.status === 'ok';
    const overallCls = overallOk ? 'text-green' : 'text-yellow';
    const overallTxt = overallOk ? 'Healthy' : 'Degraded';

    card.innerHTML = `<div class="card-title">System Health <span class="${overallCls}" style="font-size:11px;font-weight:400;text-transform:none;letter-spacing:0">${overallTxt}</span></div>
      <div class="badge-row">
        ${badge('Database', db)}
        ${badge('Ollama', ollama)}
        ${badge('Embeddings', embed)}
      </div>`;
  }

  function renderStats(stats) {
    const card = document.getElementById('card-stats');
    if (!stats) {
      card.innerHTML = '<div class="card-title">Index Stats</div><div class="unavailable">API unavailable</div>';
      return;
    }

    const coverage = (stats.chunks && stats.chunks_with_embeddings !== undefined)
      ? ((stats.chunks_with_embeddings / stats.chunks) * 100).toFixed(1) + '%'
      : '<span class="dash">—</span>';

    card.innerHTML = `<div class="card-title">Index Stats</div>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-value">${fmtNum(stats.documents)}</div>
          <div class="stat-label">Documents</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${fmtNum(stats.chunks)}</div>
          <div class="stat-label">Chunks</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${fmtNum(stats.symbols)}</div>
          <div class="stat-label">Symbols</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${fmtNum(stats.edges)}</div>
          <div class="stat-label">Edges</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${fmtNum(stats.memory_facts)}</div>
          <div class="stat-label">Memory Facts</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" style="font-size:16px">${coverage}</div>
          <div class="stat-label">Embed Coverage</div>
        </div>
      </div>`;
  }

  function renderRetrieval(overview) {
    const card = document.getElementById('card-retrieval');
    if (!overview) {
      card.innerHTML = '<div class="card-title">Retrieval Performance</div><div class="unavailable">API unavailable</div>';
      return;
    }

    const r = overview.retrieval || {};

    card.innerHTML = `<div class="card-title">Retrieval Performance</div>
      <div class="metric-list">
        <div class="metric-row">
          <span class="metric-key">Avg Query Latency</span>
          <span class="metric-val">${fmtMs(r.avg_latency_ms)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Avg Embedding Time</span>
          <span class="metric-val">${fmtMs(r.avg_embedding_ms)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Queries (24h)</span>
          <span class="metric-val">${fmtNum(r.query_count)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Avg Semantic Results</span>
          <span class="metric-val">${r.avg_semantic_count !== null && r.avg_semantic_count !== undefined ? Number(r.avg_semantic_count).toFixed(1) : '<span class="dash">—</span>'}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Avg Keyword Results</span>
          <span class="metric-val">${r.avg_keyword_count !== null && r.avg_keyword_count !== undefined ? Number(r.avg_keyword_count).toFixed(1) : '<span class="dash">—</span>'}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Avg Final Results</span>
          <span class="metric-val">${r.avg_final_count !== null && r.avg_final_count !== undefined ? Number(r.avg_final_count).toFixed(1) : '<span class="dash">—</span>'}</span>
        </div>
      </div>`;
  }

  function renderLLM(overview) {
    const card = document.getElementById('card-llm');
    if (!overview) {
      card.innerHTML = '<div class="card-title">LLM Usage</div><div class="unavailable">API unavailable</div>';
      return;
    }

    const l = overview.llm || {};
    const providers = l.by_provider || [];

    let providerRows = '';
    if (providers.length > 0) {
      providerRows = `<table class="provider-table">
        <thead><tr>
          <th>Provider / Model</th>
          <th>Calls</th>
          <th>Avg Latency</th>
        </tr></thead>
        <tbody>
          ${providers.map(p => `<tr>
            <td><span class="text-blue">${p.provider || '—'}</span><br>
              <span style="font-size:11px;color:#8b949e">${p.model || ''}</span></td>
            <td>${fmtNum(p.count)}</td>
            <td>${fmtMs(p.avg_latency_ms)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    const successPct = (l.success_rate !== null && l.success_rate !== undefined)
      ? fmtPctDirect(l.success_rate)
      : '<span class="dash">—</span>';

    card.innerHTML = `<div class="card-title">LLM Usage</div>
      <div class="metric-list" style="margin-bottom:12px">
        <div class="metric-row">
          <span class="metric-key">Total Calls (24h)</span>
          <span class="metric-val">${fmtNum(l.call_count)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Avg Latency</span>
          <span class="metric-val">${fmtMs(l.avg_latency_ms)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Input Tokens</span>
          <span class="metric-val">${fmtNum(l.total_input_tokens)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Output Tokens</span>
          <span class="metric-val">${fmtNum(l.total_output_tokens)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Success Rate</span>
          <span class="metric-val ${l.success_rate >= 0.99 ? 'text-green' : l.success_rate >= 0.9 ? 'text-yellow' : 'text-red'}">${successPct}</span>
        </div>
      </div>
      ${providerRows}`;
  }

  function renderIndexing(overview) {
    const card = document.getElementById('card-indexing');
    if (!overview) {
      card.innerHTML = '<div class="card-title">Last Indexing Job</div><div class="unavailable">API unavailable</div>';
      return;
    }

    const jobs = overview.recent_indexing || [];
    if (jobs.length === 0) {
      card.innerHTML = '<div class="card-title">Last Indexing Job</div><div class="unavailable">No indexing jobs found</div>';
      return;
    }

    const job = jobs[0];

    function statusBadge(status) {
      const s = (status || '').toLowerCase();
      if (s === 'completed') return `<span class="indexing-status status-completed"><span class="dot dot-green"></span>Completed</span>`;
      if (s === 'running')   return `<span class="indexing-status status-running"><span class="dot dot-green" style="background:#58a6ff;box-shadow:0 0 6px #58a6ff70"></span>Running</span>`;
      if (s === 'failed')    return `<span class="indexing-status status-failed"><span class="dot dot-red"></span>Failed</span>`;
      return `<span class="indexing-status status-unknown">${status || 'Unknown'}</span>`;
    }

    card.innerHTML = `<div class="card-title">Last Indexing Job</div>
      ${statusBadge(job.status)}
      <div class="metric-list">
        <div class="metric-row">
          <span class="metric-key">Duration</span>
          <span class="metric-val">${fmtDuration(job.duration_ms)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Started</span>
          <span class="metric-val">${fmtTime(job.started_at)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Files Scanned</span>
          <span class="metric-val">${fmtNum(job.files_scanned)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Files Indexed</span>
          <span class="metric-val text-green">${fmtNum(job.files_indexed)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Files Skipped</span>
          <span class="metric-val text-muted">${fmtNum(job.files_skipped)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Files Errored</span>
          <span class="metric-val ${job.files_errored > 0 ? 'text-red' : ''}">${fmtNum(job.files_errored)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Chunks Created</span>
          <span class="metric-val">${fmtNum(job.chunks_created)}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Symbols Found</span>
          <span class="metric-val">${fmtNum(job.symbols_found)}</span>
        </div>
      </div>`;
  }

  function renderTopErrors(overview) {
    const card = document.getElementById('card-top-errors');
    if (!overview) {
      card.innerHTML = '<div class="card-title">Top Errors 24h</div><div class="unavailable">API unavailable</div>';
      return;
    }

    const sigs = (overview.errors && overview.errors.top_signatures) || [];

    if (sigs.length === 0) {
      card.innerHTML = '<div class="card-title">Top Errors 24h</div><div class="unavailable" style="color:#7ee787">No errors — all clear</div>';
      return;
    }

    card.innerHTML = `<div class="card-title">Top Errors 24h</div>
      <table class="error-table">
        <thead><tr>
          <th>Signature</th>
          <th style="text-align:right;width:50px">Count</th>
          <th style="width:80px">Last Seen</th>
        </tr></thead>
        <tbody>
          ${sigs.map(s => `<tr>
            <td class="col-sig">${escHtml(s.signature || '—')}</td>
            <td class="col-count">${fmtNum(s.count)}</td>
            <td class="col-seen">${fmtTime(s.last_seen)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // State for toggle
  let recentErrorsExpanded = false;

  function renderRecentErrors(overview) {
    const card = document.getElementById('card-recent-errors');
    if (!overview) {
      card.innerHTML = '<div class="card-title">Recent Errors</div><div class="unavailable">API unavailable</div>';
      return;
    }

    const errors = (overview.errors && overview.errors.recent) || [];

    if (errors.length === 0) {
      card.innerHTML = '<div class="card-title">Recent Errors</div><div class="unavailable" style="color:#7ee787">No recent errors</div>';
      return;
    }

    const limit = recentErrorsExpanded ? 20 : 5;
    const shown = errors.slice(0, limit);
    const hasMore = errors.length > 5;

    function levelClass(level) {
      const l = (level || '').toLowerCase();
      if (l === 'error' || l === 'critical') return 'level-error';
      if (l === 'warn'  || l === 'warning')  return 'level-warn';
      return 'level-info';
    }

    const rows = shown.map(e => `<tr>
      <td class="col-time">${fmtTime(e.ts)}</td>
      <td class="col-service">${escHtml(e.service || '—')}</td>
      <td class="col-level"><span class="${levelClass(e.level)}">${escHtml(e.level || '—')}</span></td>
      <td class="col-msg">${escHtml(e.message || '—')}</td>
    </tr>`).join('');

    const toggleLabel = recentErrorsExpanded
      ? 'Show fewer'
      : `Show all ${errors.length}`;

    card.innerHTML = `<div class="card-title">Recent Errors</div>
      <table class="error-table">
        <thead><tr>
          <th>Time</th>
          <th>Service</th>
          <th>Level</th>
          <th>Message</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${hasMore ? `<span class="toggle-btn" id="toggle-recent-errors">${toggleLabel}</span>` : ''}`;

    if (hasMore) {
      document.getElementById('toggle-recent-errors').addEventListener('click', function() {
        recentErrorsExpanded = !recentErrorsExpanded;
        renderRecentErrors(lastOverview);
      });
    }
  }

  // ─── Escape HTML ──────────────────────────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── State ────────────────────────────────────────────────────────────────

  let lastOverview = null;

  // ─── Fetch & render ───────────────────────────────────────────────────────

  async function safeFetch(url) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch (e) {
      console.warn('Fetch failed for', url, e);
      return null;
    }
  }

  async function fetchAll() {
    const [overview, health, stats] = await Promise.all([
      safeFetch('/monitoring/overview'),
      safeFetch('/health'),
      safeFetch('/stats'),
    ]);

    lastOverview = overview;

    renderHealth(health);
    renderStats(stats);
    renderRetrieval(overview);
    renderLLM(overview);
    renderIndexing(overview);
    renderTopErrors(overview);
    renderRecentErrors(overview);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      'Last updated: ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ─── Bootstrap ───────────────────────────────────────────────────────────

  fetchAll();
  setInterval(fetchAll, 30000);
</script>
</body>
</html>
