server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://orchestrator:8000/api/;
    }
    location /chat {
        proxy_pass http://orchestrator:8000/chat;
    }
    location /sessions {
        proxy_pass http://orchestrator:8000/sessions;
    }
    location /ws/ {
        proxy_pass http://orchestrator:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
