services:
  # ============================================================
  # FastAPI Backend
  # ============================================================
  rag-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RAG_DB_HOST: rag-postgres
      RAG_DB_PORT: 5432
      REDIS_URL: redis://rag-redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - rag-uploads:/data/uploads
      - rag-watch:/data/watch
    depends_on:
      rag-postgres:
        condition: service_healthy
      rag-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Celery Worker (document processing)
  # ============================================================
  rag-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-worker
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2 -Q default,documents,crawl
    env_file:
      - .env
    environment:
      RAG_DB_HOST: rag-postgres
      RAG_DB_PORT: 5432
      REDIS_URL: redis://rag-redis:6379/0
      WHISPER_MODEL_SIZE: tiny
      WHISPER_BEAM_SIZE: "1"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - rag-uploads:/data/uploads
      - rag-watch:/data/watch
    depends_on:
      rag-postgres:
        condition: service_healthy
      rag-redis:
        condition: service_healthy

  # ============================================================
  # React Frontend (nginx + Vite build)
  # ============================================================
  rag-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      rag-api:
        condition: service_healthy

  # ============================================================
  # Flower — Celery task monitoring UI
  # ============================================================
  rag-flower:
    image: mher/flower:2.0
    container_name: rag-flower
    restart: unless-stopped
    command: celery --broker=redis://rag-redis:6379/0 flower --port=5555 --url_prefix=flower
    ports:
      - "5556:5555"
    depends_on:
      rag-redis:
        condition: service_healthy

  # ============================================================
  # mdream — Web crawler + HTML→Markdown converter
  # ============================================================
  # NOTE: mdream harlanzw/mdream:latest is a CLI tool, not an HTTP server.
  # It will fail with "requires interactive input". Disabled for now.
  # TODO: Find/build an HTTP wrapper for mdream, or use alternative crawling service.
  # rag-mdream:
  #   image: harlanzw/mdream:latest
  #   container_name: rag-mdream
  #   restart: unless-stopped
  #   ports:
  #     - "3002:3000"

volumes:
  rag-uploads:
  rag-watch:

networks:
  default:
    name: rag-network
    external: true
